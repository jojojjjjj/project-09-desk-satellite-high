name: Sync to Gitee (mirror)

# One-way mirror: GitHub (source of truth) -> Gitee (copy).
# Faithful mirror of all refs (branches + tags). GitHub is never modified.

on:
  push:
  schedule:
    - cron: '23 7 * * *'   # daily fallback resync
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_PRIVATE_TOKEN }}
        run: |
          set -euo pipefail
          GITEE_USER='sandpie'
          REPO="${GITHUB_REPOSITORY##*/}"
          git clone --mirror "https://github.com/${GITHUB_REPOSITORY}.git" "repo.git"
          cd "repo.git"
          git push --mirror "https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/${GITEE_USER}/${REPO}.git"
